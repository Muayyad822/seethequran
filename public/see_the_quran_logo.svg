<svg width="236" height="380" viewBox="222 60 236 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>See the Quran — app icon</title>
  <desc>A minimal circular icon: a crescent moon arc with a single radiating light ray, centered on deep black, evoking cosmic contemplation.</desc>

  <!-- Icon background circle -->
  <circle cx="340" cy="195" r="108" fill="#07070d"/>
  <circle cx="340" cy="195" r="108" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>

  <!-- Outer faint ring -->
  <circle cx="340" cy="195" r="118" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.2"/>

  <!-- Crescent: large circle minus offset circle -->
  <circle cx="340" cy="195" r="60" fill="#c9a84c" opacity="0.92"/>
  <circle cx="358" cy="188" r="54" fill="#07070d"/>

  <!-- Single vertical ray above crescent tip -->
  <line x1="340" y1="90" x2="340" y2="128" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <!-- Shorter symmetric accent rays flanking -->
  <line x1="316" y1="96" x2="322" y2="130" stroke="#c9a84c" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
  <line x1="364" y1="96" x2="358" y2="130" stroke="#c9a84c" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>

  <!-- Tiny dot at top of main ray -->
  <circle cx="340" cy="87" r="2.2" fill="#c9a84c" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="340" y="334" text-anchor="middle" fill="#c9a84c" font-family="Cormorant Garamond, Georgia, serif" font-size="18" font-weight="300">SEE THE QURAN</text>
  <text x="340" y="354" text-anchor="middle" fill="#7a6130" font-family="Cormorant Garamond, Georgia, serif" font-size="11" font-weight="300">EXPERIENCE · CONTEMPLATE · REFLECT</text>
</svg>